version: "2"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
    - dupl
    - nolintlint
  settings:
    dupl:
      threshold: 150 # tokens; golangci-lint default
    nolintlint:
      require-explanation: true # a bare //nolint:x with no reason is as bad as no comment
      require-specific: true # forbid bare //nolint; must name the linter(s)
