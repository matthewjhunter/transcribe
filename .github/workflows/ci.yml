name: CI

# Thin caller: Go CI (test/vet/fmt/lint/govulncheck) lives in
# infodancer/workflows so the definition + action pins stay identical across
# repos. See that repo's README.
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ci:
    uses: infodancer/workflows/.github/workflows/go-ci.yml@v0.2.4
